name: refresh-data

on:
  schedule:
    # Run twice a day, ~12h apart, so we capture each new epoch quickly.
    # Solana mainnet epoch is ~2 days, so 2x/day gives 1-day epoch resolution.
    - cron: "17 4 * * *"
    - cron: "17 16 * * *"
  workflow_dispatch: {}

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Refresh + retrain + predict
        env:
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
          HELIUS_RPC_URL: ${{ secrets.HELIUS_RPC_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VALIDATORS_APP_TOKEN: ${{ secrets.VALIDATORS_APP_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/refresh_all.py
          python scripts/train_downtime.py || echo "train_downtime non-fatal: insufficient history"
          python scripts/train_mev_tax.py  || echo "train_mev_tax non-fatal: insufficient history"
          python scripts/predict_today.py
          python scripts/data_quality.py
